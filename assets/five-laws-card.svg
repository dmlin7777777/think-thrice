<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" width="600" height="420">
  <defs>
    <filter id="s" x="-1%" y="-1%" width="102%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.05"/>
    </filter>
  </defs>

  <rect width="600" height="420" rx="12" fill="#F8F9FA"/>

  <text x="300" y="32" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#1A1A2E">三思 · 五铁律速查卡</text>
  <text x="300" y="50" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#90A4AE">新想法到达时，Agent 必须走完五步才能写第一行代码</text>

  <!-- Law 1 -->
  <g transform="translate(24, 64)">
    <rect x="0" y="0" width="552" height="52" rx="6" fill="#fff" stroke="#E8ECF0" stroke-width="0.5" filter="url(#s)"/>
    <rect x="0" y="0" width="3" height="52" rx="1.5" fill="#607D8B"/>
    <circle cx="24" cy="26" r="11" fill="#ECEFF1"/>
    <text x="24" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#455A64">1</text>
    <text x="44" y="21" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1A1A2E">先分类，不动手</text>
    <text x="44" y="38" font-family="system-ui, sans-serif" font-size="10" fill="#78909C">
      <tspan font-weight="600" fill="#E53935">A 堵漏</tspan><tspan> 立即修</tspan>
      <tspan dx="10" font-weight="600" fill="#FF8F00">B 优化</tspan><tspan> 问用户</tspan>
      <tspan dx="10" font-weight="600" fill="#546E7A">C 扩展</tspan><tspan> 进 inbox + 24h 冷却</tspan>
    </text>
  </g>

  <!-- Law 2 -->
  <g transform="translate(24, 126)">
    <rect x="0" y="0" width="552" height="52" rx="6" fill="#fff" stroke="#E8ECF0" stroke-width="0.5" filter="url(#s)"/>
    <rect x="0" y="0" width="3" height="52" rx="1.5" fill="#E53935"/>
    <circle cx="24" cy="26" r="11" fill="#FFEBEE"/>
    <text x="24" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#C62828">2</text>
    <text x="44" y="21" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1A1A2E">评估破坏性</text>
    <text x="44" y="38" font-family="system-ui, sans-serif" font-size="10" fill="#78909C">
      <tspan font-weight="600" fill="#43A047">双向门</tspan><tspan> 可逆，继续</tspan>
      <tspan dx="10" fill="#CFD8DC">|</tspan>
      <tspan dx="10" font-weight="600" fill="#E53935">单向门</tspan><tspan> DB/API/全局状态 → </tspan>
      <tspan font-weight="700" fill="#C62828">STOP</tspan><tspan> 等用户确认</tspan>
    </text>
  </g>

  <!-- Law 3 -->
  <g transform="translate(24, 188)">
    <rect x="0" y="0" width="552" height="52" rx="6" fill="#fff" stroke="#E8ECF0" stroke-width="0.5" filter="url(#s)"/>
    <rect x="0" y="0" width="3" height="52" rx="1.5" fill="#7E57C2"/>
    <circle cx="24" cy="26" r="11" fill="#EDE7F6"/>
    <text x="24" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#4527A0">3</text>
    <text x="44" y="21" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1A1A2E">消费者审计</text>
    <text x="44" y="38" font-family="system-ui, sans-serif" font-size="10" fill="#78909C">
      <tspan font-weight="600" fill="#E53935">0</tspan><tspan> 不建</tspan>
      <tspan dx="14" font-weight="600" fill="#7E57C2">1</tspan><tspan> 内联，不抽象</tspan>
      <tspan dx="14" font-weight="600" fill="#7E57C2">2</tspan><tspan> 可提取</tspan>
      <tspan dx="14" font-weight="600" fill="#43A047">≥3</tspan><tspan> 才考虑抽象层</tspan>
    </text>
  </g>

  <!-- Law 4 -->
  <g transform="translate(24, 250)">
    <rect x="0" y="0" width="552" height="52" rx="6" fill="#fff" stroke="#E8ECF0" stroke-width="0.5" filter="url(#s)"/>
    <rect x="0" y="0" width="3" height="52" rx="1.5" fill="#00897B"/>
    <circle cx="24" cy="26" r="11" fill="#E0F2F1"/>
    <text x="24" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#00695C">4</text>
    <text x="44" y="21" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1A1A2E">选接入模式 — 从最低破坏性开始</text>
    <text x="44" y="38" font-family="system-ui, sans-serif" font-size="10" fill="#78909C">
      <tspan font-weight="600" fill="#00897B">Wrap</tspan>
      <tspan dx="6" fill="#B0BEC5">→</tspan>
      <tspan dx="6" font-weight="600" fill="#00897B">Extend</tspan>
      <tspan dx="6" fill="#B0BEC5">→</tspan>
      <tspan dx="6" font-weight="600" fill="#FF8F00">Branch</tspan>
      <tspan dx="6" fill="#B0BEC5">→</tspan>
      <tspan dx="6" font-weight="600" fill="#E53935">Replace</tspan>
      <tspan dx="6" fill="#90A4AE">（最后手段）</tspan>
    </text>
  </g>

  <!-- Law 5 -->
  <g transform="translate(24, 312)">
    <rect x="0" y="0" width="552" height="52" rx="6" fill="#fff" stroke="#E8ECF0" stroke-width="0.5" filter="url(#s)"/>
    <rect x="0" y="0" width="3" height="52" rx="1.5" fill="#FF8F00"/>
    <circle cx="24" cy="26" r="11" fill="#FFF8E1"/>
    <text x="24" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#E65100">5</text>
    <text x="44" y="21" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1A1A2E">重复报警</text>
    <text x="44" y="38" font-family="system-ui, sans-serif" font-size="10" fill="#78909C">
      <tspan>同一逻辑 </tspan>
      <tspan font-weight="600" fill="#E65100">≥3 次重复</tspan>
      <tspan> → </tspan>
      <tspan font-weight="700" fill="#C62828">STOP</tspan>
      <tspan> 问用户：现在统一还是记 inbox？</tspan>
    </text>
  </g>

  <!-- All Clear Gate -->
  <g transform="translate(140, 378)">
    <rect x="0" y="0" width="320" height="28" rx="14" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="1"/>
    <text x="160" y="19" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#2E7D32">&#x2705; 五律通过 → 开始写代码</text>
  </g>

  <!-- Footer -->
  <text x="300" y="416" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#B0BEC5">github.com/dmlin7777777/build-forward</text>
</svg>
